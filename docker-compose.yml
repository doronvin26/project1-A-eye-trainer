services:
  # השירות הקיים שלך - שרת ה-Streamlit
  trainer-app:
    build: .
    container_name: a-eye-app
    ports:
      - "8501:8501"
    volumes:
      - ".:/app"
      - models-volume:/models  # Persistent volume for downloaded models
    stdin_open: true
    tty: true
    init: true

  # # השירות החדש - להרצת קבצי פייתון נוספים
